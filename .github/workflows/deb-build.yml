name: deb-build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      offload_arch:
        description: >-
          GPU offload architectures (semicolon-separated).
          Leave empty to use the default from debian/rules.
        required: false

permissions:
  contents: write

jobs:
  build-debs:
    name: Build .deb packages
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.2
      options: --user root
    env:
      LD_LIBRARY_PATH: /opt/rocm/lib:/usr/lib/x86_64-linux-gnu
      GEN_CHANGELOG_ROLLING: '1'

    steps:
    - name: Check out code
      uses: actions/checkout@v5.0.0
      with:
        fetch-depth: 0

    - name: Set offload architectures
      if: inputs.offload_arch != ''
      run: |
        echo "DEB_OFFLOAD_ARCH=${{ inputs.offload_arch }}" \
          >> "$GITHUB_ENV"

    - name: Install build dependencies
      run: |
        apt-get update
        apt-get install -y devscripts equivs lsb-release python3-pip
        mk-build-deps --install --remove \
          --tool 'apt-get -y --no-install-recommends' \
          debian/control

    - name: Install rocm-kpack Python tools
      run: |
        pip install --break-system-packages \
          "rocm-kpack @ git+https://github.com/ROCm/rocm-kpack.git@main"

    - name: Generate debian/changelog
      run: debian/gen-changelog.sh

    - name: Show generated changelog
      run: cat debian/changelog

    - name: Show generated release notes
      run: cat debian/generated-release-notes.md

    - name: Build .deb packages
      run: dpkg-buildpackage -us -uc -b

    - name: List built packages
      run: |
        echo "=== Built .deb files ==="
        ls -lh ../*.deb
        echo ""
        echo "=== Package contents ==="
        for deb in ../*.deb; do
          echo "--- $(basename "$deb") ---"
          dpkg-deb -c "$deb"
          echo ""
        done

    - name: Stage built packages
      run: |
        mkdir -p built-debs
        cp ../*.deb ../*.buildinfo ../*.changes built-debs/

    - name: Upload .deb artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rocm-xio-debs-${{ github.sha }}
        path: built-debs/

    - name: Update rolling package pre-release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: rocm-xio-latest
        name: Latest package build (main)
        body_path: debian/generated-release-notes.md
        prerelease: true
        make_latest: false
        files: built-debs/*
