name: build-check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - 'feat/**'
    paths:
      - '**.hip'
      - '**.cpp'
      - '**.c'
      - '**.h'
      - '**.hpp'
      - '**.cc'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'examples/**'
      - 'scripts/**'
      - 'Makefile'

jobs:
  build-check:
    name: build-check for rocm-xio
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.2
      options: --user root
    env:
      LD_LIBRARY_PATH: /opt/rocm/lib:/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
    steps:
    - name: Check out code.
      uses: actions/checkout@v5.0.0
    - name: Install additional dependencies
      run: |
        apt-get update
        apt-get install -y \
          cmake \
          curl \
          libcli11-dev \
          libdrm-dev \
          libopenmpi-dev \
          openmpi-bin
    - name: List supported GPUs.
      run: |
        mkdir -p build && cd build
        cmake -DROCM_PATH=/opt/rocm ..
        cmake --build . --target list
      env:
        CLANGXX: /opt/rocm/llvm/bin/clang++
    - name: Perform clang linting.
      uses: DoozyX/clang-format-lint-action@v0.18.2
      with:
        source: '.'
        exclude: './build ./src/include/external'
        extensions: 'cpp,h,hpp,c,cc,hip'
        clangFormatVersion: 18
        style: file
        inplace: false
    - name: Configure and build with CMake.
      run: |
        mkdir -p build && cd build
        cmake -DOFFLOAD_ARCH=gfx942:xnack+ \
          -DROCM_PATH=/opt/rocm \
          -DBUILD_TESTING=ON ..
        cmake --build . --target all
    - name: Run tester application.
      run: |
        ./build/xio-tester -h
    - name: Install with CMake.
      run: |
        cd build
        cmake --install . --prefix /tmp/rocm-xio-test
    - name: Build examples against installed prefix.
      run: |
        for ex in list-endpoints endpoint-info \
                  sdma-ep-p2p nvme-ep-info \
                  sdma-ep-allgather; do
          echo "=== Building example: ${ex} ==="
          cmake -S examples/${ex} -B /tmp/ex-${ex} \
            -DCMAKE_PREFIX_PATH="/tmp/rocm-xio-test;/opt/rocm" \
            -DOFFLOAD_ARCH=gfx942:xnack+
          cmake --build /tmp/ex-${ex}
        done
